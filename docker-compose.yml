services:
  db:
    image: postgres:15-alpine
    container_name: ts_generator_db
    environment:
      POSTGRES_USER: ts_user
      POSTGRES_PASSWORD: ts_password
      POSTGRES_DB: ts_generator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ts_user -d ts_generator"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ts_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ts_generator_backend
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql+asyncpg://ts_user:ts_password@db:5432/ts_generator
      SYNC_DATABASE_URL: postgresql://ts_user:ts_password@db:5432/ts_generator
      UPLOAD_DIR: /app/uploads
      TEMPLATE_PATH: /app/templates/TS_Template_jinja.docx
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma3:4b}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-120}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-30m}
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-32768}
      OLLAMA_TEMPERATURE: ${OLLAMA_TEMPERATURE:-0.2}
      OLLAMA_NUM_PREDICT: ${OLLAMA_NUM_PREDICT:-2048}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      GROQ_MAX_TOKENS: ${GROQ_MAX_TOKENS:-2048}
      GROQ_TIMEOUT_SECONDS: ${GROQ_TIMEOUT_SECONDS:-30}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-60}
      OPENAI_MAX_TOKENS: ${OPENAI_MAX_TOKENS:-2048}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-0.2}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-sonnet-latest}
      ANTHROPIC_VERSION: ${ANTHROPIC_VERSION:-2023-06-01}
      ANTHROPIC_TIMEOUT_SECONDS: ${ANTHROPIC_TIMEOUT_SECONDS:-60}
      ANTHROPIC_MAX_TOKENS: ${ANTHROPIC_MAX_TOKENS:-2048}
      ANTHROPIC_TEMPERATURE: ${ANTHROPIC_TEMPERATURE:-0.2}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
      GEMINI_TIMEOUT_SECONDS: ${GEMINI_TIMEOUT_SECONDS:-60}
      GEMINI_MAX_TOKENS: ${GEMINI_MAX_TOKENS:-2048}
      GEMINI_TEMPERATURE: ${GEMINI_TEMPERATURE:-0.2}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-02-15-preview}
      AZURE_OPENAI_MODEL: ${AZURE_OPENAI_MODEL:-}
      AZURE_OPENAI_TIMEOUT_SECONDS: ${AZURE_OPENAI_TIMEOUT_SECONDS:-60}
      AZURE_OPENAI_MAX_TOKENS: ${AZURE_OPENAI_MAX_TOKENS:-2048}
      AZURE_OPENAI_TEMPERATURE: ${AZURE_OPENAI_TEMPERATURE:-0.2}
      TS_DOCUMENTS_DIR: /app/ts_documents
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
      - ./ts_documents:/app/ts_documents:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ts_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ts_generator_frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - ts_network

volumes:
  postgres_data:
  backend_uploads:

networks:
  ts_network:
    driver: bridge
